<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V12 PIN generator</title>
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#eef6f1;font-family:Arial;color:#142019}
main{width:min(620px,92vw);background:#fff;padding:30px;border-radius:20px;box-shadow:0 24px 70px rgba(7,95,56,.14)}
input,textarea{display:block;width:100%;margin:7px 0 14px;padding:13px;border:1px solid #d8e5dd;border-radius:9px}textarea{min-height:110px}
button,a{display:inline-flex;border:0;border-radius:9px;padding:12px 16px;background:#087943;color:#fff;text-decoration:none;font-weight:800;cursor:pointer}
.note{background:#fff5dc;border-radius:10px;padding:12px;color:#725000;font-size:12px;line-height:1.6;margin:15px 0}
</style>
</head>
<body><main>
<p>BUVAYDA IBRAT MEBEL V12</p><h1>Yangi PIN hash yaratish</h1>
<label>Yangi 4–8 xonali PIN</label><input id="pin" type="password" inputmode="numeric" maxlength="8" placeholder="Masalan: 2580">
<button id="generate">Hash yaratish</button>
<label style="display:block;margin-top:18px">Tayyor hash</label><textarea id="result" readonly></textarea>
<div class="note">GitHub’dagi <b>pin-config.js</b> faylini oching va <b>ADMIN_PIN_HASH</b> qiymatini shu hash bilan almashtiring.</div>
<a href="./super-admin.html">Super Admin’ga qaytish</a>
</main>
<script>
async function sha256(value){
  const data=new TextEncoder().encode(value);
  const hash=await crypto.subtle.digest("SHA-256",data);
  return [...new Uint8Array(hash)].map(x=>x.toString(16).padStart(2,"0")).join("");
}
document.getElementById("generate").onclick=async()=>{
  const input=document.getElementById("pin");
  input.value=input.value.replace(/\D/g,"").slice(0,8);
  if(!/^\d{4,8}$/.test(input.value)){alert("PIN 4–8 ta raqamdan iborat bo‘lsin.");return}
  document.getElementById("result").value=await sha256(input.value);
};
</script></body></html>
